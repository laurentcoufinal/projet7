name: CI-CD Mon Projet Web

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test-auth-chat:
    name: Tests Node (auth/chat)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - microservices/auth-service
          - microservices/chat-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Run tests
        run: npm test
        working-directory: ${{ matrix.service }}
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'dev-secret-change-me' }}

  test-product:
    name: Tests Python (product-service)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: microservices/product-service

      - name: Run tests
        run: python -m unittest discover -s tests -v
        working-directory: microservices/product-service

  build-frontend:
    name: Build frontend Angular
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    needs:
      - test-auth-chat
      - test-product
      - build-frontend
    if: vars.AWS_REGION != '' && vars.TF_STATE_BUCKET != '' && vars.TF_STATE_KEY != '' && vars.TF_STATE_REGION != '' && secrets.AWS_ROLE_TO_ASSUME != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}"
        working-directory: terraform
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}

      - name: Terraform plan
        run: terraform plan -input=false
        working-directory: terraform
        env:
          TF_VAR_ssh_allowed_cidr: ${{ vars.TF_VAR_SSH_ALLOWED_CIDR }}
          TF_VAR_http_allowed_cidr: ${{ vars.TF_VAR_HTTP_ALLOWED_CIDR }}
          TF_VAR_key_name: ${{ vars.TF_VAR_KEY_NAME }}

  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs:
      - terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.AWS_REGION != '' && vars.TF_STATE_BUCKET != '' && vars.TF_STATE_KEY != '' && vars.TF_STATE_REGION != '' && secrets.AWS_ROLE_TO_ASSUME != ''
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}"
        working-directory: terraform
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
        working-directory: terraform
        env:
          TF_VAR_ssh_allowed_cidr: ${{ vars.TF_VAR_SSH_ALLOWED_CIDR }}
          TF_VAR_http_allowed_cidr: ${{ vars.TF_VAR_HTTP_ALLOWED_CIDR }}
          TF_VAR_key_name: ${{ vars.TF_VAR_KEY_NAME }}

  docker-build-and-push:
    name: Build et push images Docker
    runs-on: ubuntu-latest
    needs:
      - test-auth-chat
      - test-product
      - build-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./microservices/auth-service
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/auth-service:${{ github.sha }}

      - name: Build and push product-service
        uses: docker/build-push-action@v6
        with:
          context: ./microservices/product-service
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/product-service:${{ github.sha }}

      - name: Build and push chat-service
        uses: docker/build-push-action@v6
        with:
          context: ./microservices/chat-service
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/chat-service:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
