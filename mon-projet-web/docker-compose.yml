services:
  redis:
    image: redis:7-alpine
    container_name: poc-redis
    ports:
      - "6379:6379"

  auth-service:
    build:
      context: ./microservices/auth-service
    image: laurentcoufinal/projet7-auth-service:latest
    container_name: poc-auth-service
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - redis

  product-service:
    build:
      context: ./microservices/product-service
    image: laurentcoufinal/projet7-product-service:latest
    container_name: poc-product-service
    environment:
      PORT: 8000

  chat-service:
    build:
      context: ./microservices/chat-service
    image: laurentcoufinal/projet7-chat-service:latest
    container_name: poc-chat-service
    environment:
      PORT: 3003
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    image: laurentcoufinal/projet7-frontend:latest
    container_name: poc-frontend
    ports:
      - "4200:4200"
    depends_on:
      - auth-service
      - product-service
      - chat-service

  gateway:
    image: nginx:1.27-alpine
    container_name: poc-gateway
    ports:
      - "8081:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth-service
      - product-service
      - chat-service
